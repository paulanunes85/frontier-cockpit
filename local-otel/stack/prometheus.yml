# Local Prometheus config for metric history.
# Scrapes the OpenTelemetry Collector's Prometheus exporter. Local retention is set to
# 30 days via the command flags in docker-compose.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
